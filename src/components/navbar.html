<header x-data="{ scrolled: false, mobileMenu: false }">
  <nav
    @scroll.window="scrolled = window.scrollY > 20"
    class="fixed top-0 left-0 z-50 w-full transition-all duration-300"
  >
    <div
      :class="scrolled ? 'bg-black/30 backdrop-blur-2xl border-b border-white/5 shadow-2xl px-8 py-4' : 'bg-transparent px-10 py-5'"
      class="flex w-full items-center justify-between transition-all duration-300"
    >
      <div class="flex items-center gap-3">
        <img
          src="/src/assets/images/logo.png"
          alt="HRC Logo"
          :class="scrolled ? 'w-10 h-10' : 'w-12 h-12'"
          class="transition-all duration-300"
        />
        <div>
          <h1 class="text-lg font-bold tracking-wide">HRC #2</h1>
          <p class="text-xs text-zinc-400">Habibie Robotic Competition #2</p>
        </div>
      </div>

      <div class="hidden items-center gap-2 lg:flex">
        <a
          href="#home"
          @click="$store.navbar.activeSection='home'"
          :class="$store.navbar.activeSection==='home' ? 'nav-active' : ''"
          class="nav-link nav-link-hover"
          >Beranda</a
        >
        <a
          href="#about"
          @click="$store.navbar.activeSection='about'"
          :class="$store.navbar.activeSection==='about' ? 'nav-active' : ''"
          class="nav-link nav-link-hover"
          >Tentang</a
        >
        <a
          href="#competition"
          @click="$store.navbar.activeSection='competition'"
          :class="$store.navbar.activeSection==='competition' ? 'nav-active' : ''"
          class="nav-link nav-link-hover"
          >Kompetisi</a
        >
        <a
          href="#timeline"
          @click="$store.navbar.activeSection='timeline'"
          :class="$store.navbar.activeSection==='timeline' ? 'nav-active' : ''"
          class="nav-link nav-link-hover"
          >Timeline</a
        >
        <a
          href="#gallery"
          @click="$store.navbar.activeSection='gallery'"
          :class="$store.navbar.activeSection==='gallery' ? 'nav-active' : ''"
          class="nav-link nav-link-hover"
          >Gallery</a
        >
        <a
          href="#contact"
          @click="$store.navbar.activeSection='contact'"
          :class="$store.navbar.activeSection==='contact' ? 'nav-active' : ''"
          class="nav-link nav-link-hover"
          >Contact</a
        >
      </div>

      <div class="hidden items-center lg:flex">
        <a href="#competition" class="group btn-primary btn-primary-hover">
          Daftar Sekarang
          <span
            class="ml-2 transition-transform duration-300 group-hover:translate-x-1"
            >→</span
          >
        </a>
      </div>

      <button
        @click="mobileMenu = !mobileMenu"
        class="relative flex h-11 w-11 items-center justify-center rounded-xl border border-white/10 bg-black/20 backdrop-blur-xl transition-all duration-300 hover:bg-white/10 lg:hidden"
      >
        <div class="relative h-5 w-6">
          <span
            :class="mobileMenu ? 'translate-y-2 rotate-45' : ''"
            class="absolute top-0 left-0 h-0.5 w-6 rounded-full bg-white transition-all duration-300"
          ></span>
          <span
            :class="mobileMenu ? 'opacity-0' : ''"
            class="absolute top-2 left-0 h-0.5 w-6 rounded-full bg-white transition-all duration-300"
          ></span>
          <span
            :class="mobileMenu ? '-translate-y-2 -rotate-45' : ''"
            class="absolute top-4 left-0 h-0.5 w-6 rounded-full bg-white transition-all duration-300"
          ></span>
        </div>
      </button>
    </div>
  </nav>

  <div
    x-cloak
    x-show="mobileMenu"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 scale-95 -translate-y-4"
    x-transition:enter-end="opacity-100 scale-100 translate-y-0"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95 -translate-y-4"
    class="fixed top-24 right-4 left-4 z-50 rounded-3xl border border-white/10 bg-black/80 p-6 shadow-2xl backdrop-blur-2xl lg:hidden"
  >
    <div class="flex flex-col gap-2">
      <a
        href="#home"
        @click="$store.navbar.activeSection='home'; mobileMenu=false"
        :class="$store.navbar.activeSection==='home' ? 'nav-active' : ''"
        class="nav-link transition-all hover:translate-x-2 hover:bg-white/5"
        >Beranda</a
      >
      <a
        href="#about"
        @click="$store.navbar.activeSection='about'; mobileMenu=false"
        :class="$store.navbar.activeSection==='about' ? 'nav-active' : ''"
        class="nav-link transition-all hover:translate-x-2 hover:bg-white/5"
        >Tentang</a
      >
      <a
        href="#competition"
        @click="$store.navbar.activeSection='competition'; mobileMenu=false"
        :class="$store.navbar.activeSection==='competition' ? 'nav-active' : ''"
        class="nav-link transition-all hover:translate-x-2 hover:bg-white/5"
        >Kompetisi</a
      >
      <a
        href="#timeline"
        @click="$store.navbar.activeSection='timeline'; mobileMenu=false"
        :class="$store.navbar.activeSection==='timeline' ? 'nav-active' : ''"
        class="nav-link transition-all hover:translate-x-2 hover:bg-white/5"
        >Timeline</a
      >
      <a
        href="#gallery"
        @click="$store.navbar.activeSection='gallery'; mobileMenu=false"
        :class="$store.navbar.activeSection==='gallery' ? 'nav-active' : ''"
        class="nav-link transition-all hover:translate-x-2 hover:bg-white/5"
        >Gallery</a
      >
      <a
        href="#contact"
        @click="$store.navbar.activeSection='contact'; mobileMenu=false"
        :class="$store.navbar.activeSection==='contact' ? 'nav-active' : ''"
        class="nav-link transition-all hover:translate-x-2 hover:bg-white/5"
        >Contact</a
      >
      <a
        href="#competition"
        class="btn-primary btn-primary-hover mt-4 justify-center"
        >Daftar Sekarang</a
      >
    </div>
  </div>
</header>
